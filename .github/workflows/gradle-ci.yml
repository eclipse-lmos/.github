name: CI

on:
  workflow_call

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4.2.2
      - name: REUSE Compliance Check
        uses: fsfe/reuse-action@v5.0.0
      - name: Set up JDK 25
        uses: actions/setup-java@v4.7.0
        with:
          java-version: '25'
          distribution: 'temurin'
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6.0.1
      - name: Build with Gradle
        run: ./gradlew build
      - name: Upload JUnit XML test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: junit-test-results
          path: |
            **/build/test-results/test/*.xml
          if-no-files-found: warn
          retention-days: 1
      - name: Upload HTML test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: junit-test-report-html
          path: |
            **/build/reports/tests/test/**
          if-no-files-found: warn
          retention-days: 1
